<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0a0a0a" rx="80"/>
  <!-- Film strip body -->
  <rect x="80" y="160" width="352" height="192" rx="20" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="4"/>
  <!-- Sprocket holes left -->
  <rect x="100" y="180" width="48" height="40" rx="8" fill="#0a0a0a"/>
  <rect x="100" y="236" width="48" height="40" rx="8" fill="#0a0a0a"/>
  <rect x="100" y="292" width="48" height="40" rx="8" fill="#0a0a0a"/>
  <!-- Sprocket holes right -->
  <rect x="364" y="180" width="48" height="40" rx="8" fill="#0a0a0a"/>
  <rect x="364" y="236" width="48" height="40" rx="8" fill="#0a0a0a"/>
  <rect x="364" y="292" width="48" height="40" rx="8" fill="#0a0a0a"/>
  <!-- Frame window -->
  <rect x="168" y="176" width="176" height="160" rx="8" fill="#d4a853" opacity="0.15"/>
  <!-- Center circle -->
  <circle cx="256" cy="256" r="40" fill="#d4a853"/>
  <circle cx="256" cy="256" r="24" fill="#0a0a0a"/>
</svg>
